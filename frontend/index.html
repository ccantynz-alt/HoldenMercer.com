<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holden Mercer — AI Builder Console</title>
    <meta name="description" content="An AI website builder console. Run many Claude-driven projects in parallel with persistent memory, programmatic gates, and self-repairing builds." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Holden Mercer — AI Builder Console" />
    <meta property="og:description" content="Run many Claude-driven projects in parallel with persistent memory, programmatic gates, and self-repairing builds." />
    <meta property="og:url" content="https://www.holdenmercer.com/" />
    <meta property="og:image" content="https://www.holdenmercer.com/icon.svg" />
    <meta property="og:site_name" content="Holden Mercer" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Holden Mercer — AI Builder Console" />
    <meta name="twitter:description" content="Run many Claude-driven projects in parallel with persistent memory, programmatic gates, and self-repairing builds." />
    <meta name="twitter:image" content="https://www.holdenmercer.com/icon.svg" />

    <!-- Structured data — informational, helps search engines understand the page -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Holden Mercer",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web",
        "url": "https://www.holdenmercer.com/",
        "description": "AI website builder console. Run many Claude-driven projects in parallel with persistent memory, programmatic gates, and self-repairing builds."
      }
    </script>

    <!-- PWA — Add to Home Screen on iPad / desktop -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <meta name="theme-color" content="#0a0a0b" />
    <!-- Modern equivalent + Apple legacy (deprecated but kept for iPad back-compat). -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Holden Mercer" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Register the service worker so the PWA can install + handle
      // future web-push events. Failure is non-fatal.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch((err) => {
            console.warn('SW registration failed', err)
          })
        })
      }
    </script>
  </body>
</html>
